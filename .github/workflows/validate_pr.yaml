name: validate pull request

on:
  pull_request:
    branches:
      - main

permissions:
  contents: none

jobs:
  validate:
    name: validate
    strategy:
      matrix:
        arch: [ x64, arm64 ]
    runs-on: github-hosted-ubuntu-${{ matrix.arch }}-small
    permissions:
      contents: read
      id-token: write
    container:
      image: ghcr.io/grafana/grafana-build-tools:v1.41.0@sha256:5d9716000ef2b72e8240f05baccc9ca76f40b69fb4c146250cdb8b221a28b650
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: set up global git config
        run: |
          # The directory where the code has been checked out ends up belonging
          # to a different user, so git complains about permissions. Indicate
          # that it's safe to ignore.
          git config --global --add safe.directory '*'

      - name: Get GitHub App token
        id: get-github-app-token
        uses: grafana/shared-workflows/actions/create-github-app-token@46f48da11e78ebdba7a8747ae456b11062fac83e # create-github-app-token/v0.3.1
        with:
          github_app: synthetic-monitoring-ci

      - name: create Git credentials
        id: git-credentials
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          APP_TOKEN: ${{ steps.get-github-app-token.outputs.token }}
        run: |
          echo "machine github.com login ${GITHUB_ACTOR} password ${APP_TOKEN}" >> ~/.netrc
          chmod 600 ~/.netrc

      - name: ensure dependencies are up-to-date
        run: |
          make deps
          scripts/enforce-clean

      - name: version
        id: version
        run: |
          make version
          echo "value=$(cat dist/version)" >> "$GITHUB_OUTPUT"

      - name: identify platform
        id: id-platform
        run: |
          echo "platform=$(go env GOOS)/$(go env GOARCH)" >> "$GITHUB_OUTPUT"

      - name: build
        run: make build-native
 
      - name: lint
        run: make lint

      - name: test
        run: make test

      - name: find Dockerfile
        id: find-dockerfile
        run: |
          if test -e Dockerfile ; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: test docker build
        uses: grafana/shared-workflows/actions/docker-build-push-image@34f27887c37cafe70d34af57dfc86b468a31b8c4 # docker-build-push-image/v0.3.3
        if: steps.find-dockerfile.outputs.found == 'true'
        with:
          push: false
          registries: dockerhub
          platforms: |-
            ${{ steps.id-platform.outputs.platform }}
          tags: |-
            type=raw,value=${{ steps.version.outputs.value }}
            type=sha,prefix=sha-,format=short
            latest
