name: Validate Policy Bot Config

on:
  pull_request:
    paths:
      - .policy.yml
      - .github/workflows/validate-policy-bot-config.yml
      - scripts/check-policy-bot-config
      - scripts/gen-policy-bot-config

  push:
    branches:
      - main
    paths:
      - .policy.yml
      - .github/workflows/validate-policy-bot-config.yml
      - scripts/check-policy-bot-config
      - scripts/gen-policy-bot-config

permissions:
  contents: none

jobs:
  validate:
    name: Validate policy bot config

    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check drift
        run: |
          ./scripts/gen-policy-bot-config

          ./scripts/check-policy-bot-config "$GITHUB_STEP_SUMMARY"

      - name: Validate policy bot config
        run: |
          curl \
            --silent \
            --fail-with-body \
            --request PUT \
            --upload-file .policy.yml \
            https://github-policy-bot.grafana-ops.net/api/validate
